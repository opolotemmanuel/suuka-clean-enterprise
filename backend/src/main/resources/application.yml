server:
  port: 8080

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/suuka_clean}
    username: ${DATABASE_USERNAME:suuka_user}
    password: ${DATABASE_PASSWORD:StrongPassword123!}
    driver-class-name: ${DATABASE_DRIVER:org.postgresql.Driver}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

suuka:
  security:
    jwt-secret: ${JWT_SECRET:dev-secret-change-me-dev-secret-change-me-32}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:60}
    refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:14}
