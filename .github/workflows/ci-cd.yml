name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build with Maven
        run: mvn -B package --file pom.xml

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init
      - name: Terraform Plan
        working-directory: infra/terraform
        run: terraform plan -out=tfplan

  deploy:
    runs-on: ubuntu-latest
    needs: [build, terraform]
    steps:
      - uses: actions/checkout@v4
      - name: Deploy placeholder (manual step)
        run: echo "Add deployment steps here using Azure/login and Azure CLI or azurerm actions"
